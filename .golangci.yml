version: "2"

linters:
  default: standard
  enable:
    - misspell
    - unconvert
    - goconst
    - bodyclose
    - noctx
    - errname
    - errorlint
    - exhaustive
    - copyloopvar
    - intrange
  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment
    errcheck:
      check-type-assertions: true
    goconst:
      min-len: 3
      min-occurrences: 3
    misspell:
      locale: US
    exhaustive:
      default-signifies-exhaustive: true

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
